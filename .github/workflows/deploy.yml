# CI/CD — Lint → Build → Tests E2E → Deploy Vercel
# PRs: preview URLs automáticas. main: deploy producción.
# Bloquear merge si falla: en GitHub repo Settings → Branches → main → Require status checks.

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"
          SESSION_SECRET: "ci-build-placeholder-secret-min-32-chars"
          DISABLE_PWA: "1"

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"
          SESSION_SECRET: "ci-build-placeholder-secret-min-32-chars"
          DISABLE_PWA: "1"

      - name: Start server
        run: npm run start &
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"
          SESSION_SECRET: "ci-build-placeholder-secret-min-32-chars"

      - name: Wait for server
        run: timeout 60 bash -c 'until curl -sf http://localhost:3000 >/dev/null; do sleep 2; done'

      - name: Run E2E
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"
          NEXT_PUBLIC_DEMO_MODE: "true"

  deploy:
    name: Deploy Vercel
    runs-on: ubuntu-latest
    needs: [lint-build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
